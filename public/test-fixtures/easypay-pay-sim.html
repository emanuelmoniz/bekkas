<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Easypay pay-page simulator (test fixture)</title>
  <style>body{font-family:system-ui,Arial;margin:24px}button{margin:6px}</style>
</head>
<body>
  <h1>Pay page simulator</h1>
  <div id="status">idle</div>
  <button id="prepare">Prepare SDK</button>
  <button id="start" disabled>Start SDK</button>
  <button id="simulate-already-paid" disabled>Simulate SDK 'already-paid'</button>

  <script>
    const status = document.getElementById('status');
    const start = document.getElementById('start');
    const prepare = document.getElementById('prepare');
    const simulateAlready = document.getElementById('simulate-already-paid');

    const orderUuid = 'ORDER-TEST-123';
    async function doPrepare() {
      status.textContent = 'calling /orders/' + orderUuid + '/pay/prepare';
      const res = await fetch('/orders/' + orderUuid + '/pay/prepare', { method: 'POST', headers: { 'content-type': 'application/json' } });
      const body = await res.json();
      status.textContent = JSON.stringify(body);
      if (body.action === 'new-manifest' || body.action === 'ok') {
        start.disabled = false;
        simulateAlready.disabled = false;
      }
      if (body.action === 'already-paid') {
        start.disabled = true;
        simulateAlready.disabled = true;
      }
    }

    async function simulateSdkStart() {
      status.textContent = 'sdk started (simulated)';
    }

    async function simulateAlreadyPaid() {
      status.textContent = 'sdk -> posting /easypay/sdk/error (already-paid)';
      const res = await fetch('/easypay/sdk/error', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ error: { code: 'already-paid', payment: { id: 'pay_1' }, checkoutId: 'chk_1' } }) });
      const body = await res.json();
      status.textContent = 'sdk error response: ' + JSON.stringify(body);
    }

    prepare.addEventListener('click', doPrepare);
    start.addEventListener('click', simulateSdkStart);
    simulateAlready.addEventListener('click', simulateAlreadyPaid);
  </script>
</body>
</html>
