<!DOCTYPE html>
<html lang="pt-PT">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="csrf-token" content="test">

        <title>BEKKAS - 3D Printing Studio [DEV]</title>

        <!-- Favicons -->
        <link rel="apple-touch-icon" sizes="180x180" href="https://dev.bekkas.pt/images/favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="https://dev.bekkas.pt/images/favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="https://dev.bekkas.pt/images/favicon/favicon-16x16.png">
        <link rel="manifest" href="https://dev.bekkas.pt/site.webmanifest">
        <meta name="theme-color" content="#f4eee4">


        <!-- Scripts -->
        <link rel="preload" as="style" href="https://dev.bekkas.pt/build/app.css" /><link rel="modulepreload" as="script" href="https://dev.bekkas.pt/build/assets/app-Co8gNTPR.js" /><link rel="stylesheet" href="https://dev.bekkas.pt/build/app.css" /><script type="module" src="https://dev.bekkas.pt/build/assets/app-Co8gNTPR.js"></script>
        <!-- Google reCAPTCHA (loaded only on pages that request it) -->
            </head>
        <body class="font-sans text-dark antialiased" >
        <div class="min-h-screen flex flex-col sm:justify-center items-center pt-6 sm:pt-0 bg-grey-light">
            <div>
                <a href="/">
                    <img src="https://dev.bekkas.pt/images/hero_logo.svg" alt="BEKKAS" class="h-28 w-auto">
                </a>
            </div>

            <div class="w-full sm:max-w-md mt-10 px-6 py-4 bg-white shadow-md overflow-hidden sm:rounded-lg">
                <!-- Flash Messages (canonical; supports success|error|warning|info) -->
                <!-- Canonical flash partial: server-rendered fallback + Alpine-driven runtime -->
<div data-flash-root x-data="{ localShow: false }" x-show="Alpine.store('flash').show || localShow" x-cloak class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4"  style="display:none"  x-bind:aria-hidden="!(Alpine.store('flash').show || localShow)">
    <div class="px-4 py-3 rounded relative pr-12 border border-grey-light border-l-4"
         x-show="Alpine.store('flash').show || localShow"
         x-transition
         x-bind:class="{
             'bg-status-success/10 border-status-success text-status-success': Alpine.store('flash').type === 'success' || false,
             'bg-status-error/10 border-status-error text-status-error': Alpine.store('flash').type === 'error' || false,
             'bg-status-warning/10 border-status-warning text-status-warning': Alpine.store('flash').type === 'warning' || false,
             'bg-status-info/10 border-status-info text-status-info': Alpine.store('flash').type === 'info' || false,
         }"
         role="alert"
         x-bind:aria-live="(Alpine.store('flash').type === 'error' || false) ? 'assertive' : 'polite'"
         x-bind:aria-hidden="!(Alpine.store('flash').show || localShow)">

        <span class="block sm:inline" x-text="Alpine.store('flash').message || &quot;&quot;"></span>

        <button @click="Alpine.store('flash').hide(); localShow = false"
                x-bind:tabindex="(Alpine.store('flash').show || localShow) ? 0 : -1"
                x-bind:aria-hidden="!(Alpine.store('flash').show || localShow)"
                class="absolute inset-y-0 right-0 flex items-center px-8"
                aria-label="Close flash message">
            <svg class="fill-current h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" aria-hidden="true">
                <title>Close</title>
                <path d="M14.348 14.849a1.2 1.2 0 0 1-1.697 0L10 11.819l-2.651 3.029a1.2 1.2 0 1 1-1.697-1.697l2.758-3.15-2.759-3.152a1.2 1.2 0 1 1 1.697-1.697L10 8.183l2.651-3.031a1.2 1.2 0 1 1 1.697 1.697l-2.758 3.152 2.758 3.15a1.2 1.2 0 0 1 0 1.698z"/>
            </svg>
        </button>
    </div>
</div>

                <!-- Session Status -->
    
    <!-- Social login -->
    <div class="mb-4 text-center space-y-2">
                    <a href="https://dev.bekkas.pt/login/google" class="inline-flex items-center justify-center w-full border rounded-full uppercase px-8 py-3 bg-white hover:bg-white">
                <img src="/images/google-logo.svg" alt="Google" class="me-2 h-5 w-5">
                auth.continue_with_google
            </a>
        
                    <a href="https://dev.bekkas.pt/login/microsoft" class="inline-flex items-center justify-center w-full border rounded-full uppercase px-8 py-3 bg-white hover:bg-white">
                <img src="/images/microsoft-logo.svg" alt="Microsoft" class="me-2 h-5 w-5">
                auth.continue_with_microsoft
            </a>
            </div>

    
    
    
    <form method="POST" action="https://dev.bekkas.pt/login">
        <input type="hidden" name="_token" value="test" autocomplete="off">
        <!-- Email Address -->
        <div>
            <label class="block font-medium text-sm text-grey-dark" for="email">
    auth.email
</label>
            <input  class="border-grey-medium focus:border-accent-primary focus:ring-primary rounded-md shadow-sm block mt-1 w-full" id="email" type="email" name="email" required="required" autofocus="autofocus" autocomplete="username">
                    </div>

        <!-- Password -->
        <div class="mt-4">
            <label class="block font-medium text-sm text-grey-dark" for="password">
    auth.password
</label>

            <input  class="border-grey-medium focus:border-accent-primary focus:ring-primary rounded-md shadow-sm block mt-1 w-full" id="password" type="password" name="password" required="required" autocomplete="current-password">

                    </div>

        <!-- Remember Me -->
        <div class="block mt-4">
            <label for="remember_me" class="inline-flex items-center">
                <input id="remember_me" type="checkbox" class="rounded border-grey-medium text-accent-primary shadow-sm focus:ring-primary" name="remember">
                <span class="ms-2 text-sm text-grey-dark">auth.remember_me</span>
            </label>
        </div>

        <div class="flex items-center justify-end mt-4">
                            <a class="underline text-sm text-grey-dark hover:text-dark rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" href="https://dev.bekkas.pt/forgot-password">
                    Esqueceu-se da sua palavra-passe? Sem problema.
                </a>
            
            <button type="submit" class="inline-flex items-center px-8 py-3 bg-primary border border-transparent rounded-full font-semibold text-xs text-white uppercase tracking-widest hover:bg-primary/90 focus:bg-primary/90 active:opacity-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition ease-in-out duration-150 disabled:opacity-25 ms-3">
    Entrar
</button>
        </div>

        <div class="mt-4 text-center">
            <span class="text-sm text-grey-dark">auth.not_a_user</span>
            <a class="underline text-sm text-grey-dark hover:text-dark rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" href="https://dev.bekkas.pt/register">
                auth.please_register
            </a>
        </div>
    </form>
            </div>
        </div>
    </body>
</html>
